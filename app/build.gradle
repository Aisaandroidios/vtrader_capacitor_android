import groovy.json.JsonSlurper

apply plugin: 'com.android.application'
apply plugin: 'com.google.gms.google-services'
apply plugin: 'com.google.firebase.crashlytics'


def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
def hasKeystoreProperties = keystorePropertiesFile.exists()
if (hasKeystoreProperties) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def appDisplayName = "app"
try {
    def stringsFile = file("src/main/res/values/strings.xml")
    if (stringsFile.exists()) {
        def stringsXml = new XmlParser().parse(stringsFile)
        def appNameNode = stringsXml.string.find { it.@name == "app_name" }
        if (appNameNode != null && appNameNode.text()?.trim()) {
            appDisplayName = appNameNode.text().trim()
        }
    }
} catch (Exception ignored) {}
def safeAppName = appDisplayName.replaceAll("[^A-Za-z0-9._-]", "_")
def packageJson = [:]
try {
    def packageJsonFile = rootProject.file("../package.json")
    if (packageJsonFile.exists()) {
        packageJson = new JsonSlurper().parseText(packageJsonFile.text)
    }
} catch (Exception ignored) {}
def packageVersionName = (packageJson.version ?: "1.0.0").toString()
def resolvedVersionName = (System.getenv("ANDROID_VERSION_NAME") ?: packageVersionName).toString()
def resolveVersionCode = { String versionName ->
    def envVersionCode = System.getenv("ANDROID_VERSION_CODE") ?: System.getenv("BUILD_NUMBER")
    if (envVersionCode) {
        return envVersionCode.toInteger()
    }

    def baseVersion = versionName.tokenize("-")[0]
    def versionParts = baseVersion.tokenize(".").collect { part ->
        try {
            return part.toInteger()
        } catch (Exception ignored) {
            return 0
        }
    }
    while (versionParts.size() < 3) {
        versionParts << 0
    }

    return (versionParts[0] * 1000000) + (versionParts[1] * 1000) + versionParts[2]
}
def resolvedVersionCode = resolveVersionCode(resolvedVersionName)

android {
    namespace = "com.vprop.vtrader.android"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.vprop.vtrader.android"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode resolvedVersionCode
        versionName resolvedVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    if (hasKeystoreProperties) {
        signingConfigs {
            release {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (hasKeystoreProperties) {
                signingConfig signingConfigs.release
            }
        }
    }
}

android.applicationVariants.all { variant ->
    variant.outputs.all { output ->
        def verName = variant.versionName
        def verCode = variant.versionCode
        def timestamp = new Date().format("yyyyMMdd_HHmm")
        def filters = []
        try {
            if (output.filters != null) {
                output.filters.each { f -> if (f != null && f.identifier) filters.add(f.identifier) }
            }
        } catch (ignored) {}
        def suffix = filters.isEmpty() ? "" : ("-" + filters.join("-"))
        outputFileName = "${safeAppName}-${variant.name}-${verName}-vc${verCode}-${timestamp}${suffix}.apk"
    }
}

android.applicationVariants.all { variant ->
    if (variant.buildType.name == "release") {
        def taskName = "bundle${variant.name.capitalize()}"
        tasks.matching { it.name == taskName }.all { t ->
            t.doLast {
                def outDir = file("$buildDir/outputs/bundle/${variant.name}")
                if (!outDir.exists()) return
                def files = outDir.listFiles()?.findAll { it.name.toLowerCase().endsWith(".aab") } ?: []
                files.each { f ->
                    def verName = variant.versionName
                    def verCode = variant.versionCode
                    def timestamp = new Date().format("yyyyMMdd_HHmm")
                    def newName = "${safeAppName}-${variant.name}-${verName}-vc${verCode}-${timestamp}.aab"
                    f.renameTo(new File(outDir, newName))
                }
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation platform('com.google.firebase:firebase-bom:34.11.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'
